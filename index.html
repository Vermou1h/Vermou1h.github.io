<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Haorui Li - Homepage</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            color: #333;
            text-align: center;
        }

        header {
            background-color: #007BFF;
            color: #fff;
            padding: 10px; /* 调整蓝色部分的高度和内边距 */
            text-align: center; /* 居中文本 */
        }

        section {
            padding: 40px;
        }

        h1 {
            font-size: 1.2em;
            margin-bottom: 10px;
        }

        p {
            font-size: 1.2em;
            margin-bottom: 20px;
        }

        footer {
            background-color: #333;
            color: #fff;
            padding: 10px;
            position: fixed;
            bottom: 0;
            width: 100%;
        }

        embed {
            width: 100%;
            height: 800px; /* 调整 PDF 视图窗口的高度 */
        }
    </style>
</head>
<body>

    <header>
        <h1>Homepage</h1>
    </header>

    <section>
        <!-- 嵌入 PDF 文件 -->
        <embed src= "CV.pdf" type="application/pdf"/>
    </section>

    <footer>
        &copy; 2024 Haorui Li
    </footer>

</body>
</html>
